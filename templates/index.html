<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Şifreli ve Yetkili DH+AES Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #d1d7db; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .main-wrapper { display: flex; width: 850px; height: 650px; background-color: #f0f2f5; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); overflow: hidden; }
        .side-panel { width: 250px; background-color: white; border-right: 1px solid #e9edef; display: flex; flex-direction: column; }
        .side-header { background-color: #008069; color: white; padding: 18px; font-weight: bold; font-size: 1.1em; text-align: center; }
        .user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item { padding: 10px; border-bottom: 1px solid #f0f2f5; display: flex; flex-direction: column; cursor: pointer; }
        .user-item .username { font-weight: bold; color: #333; text-transform: capitalize;}
        .user-item .pubkey { font-size: 0.75em; color: #8696a0; font-family: monospace; }
        .chat-container { flex: 1; background-color: #efeae2; display: flex; flex-direction: column; overflow: hidden; }
        .header { background-color: #008069; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 8px 12px; border-radius: 8px; max-width: 75%; word-wrap: break-word; display: flex; flex-direction: column;}
        .message.sent { background-color: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .message.received { background-color: white; align-self: flex-start; border-top-left-radius: 0; }
        .message.garbage { background-color: #fcd7d7; align-self: flex-start; font-style: italic; color: #721c24; border: 1px dashed #f5c6cb; border-top-left-radius: 0; }
        .sender-name { font-size: 0.75em; color: #02967c; font-weight: bold; margin-bottom: 3px; text-transform: capitalize; }
        .status { font-size: 0.8em; color: gray; margin-left: 10px; align-self: flex-end; }
        .status.read { color: #53bdeb; }
        .read-info { font-size: 0.7em; color: #8696a0; align-self: flex-end; font-style: italic; }
        .input-area { display: flex; padding: 10px; background-color: #f0f2f5; gap: 5px; }
        .input-area input { padding: 12px; border: none; border-radius: 20px; outline: none; }
        #targetInput { width: 90px; text-align: center; font-weight: bold; }
        #messageInput { flex: 1; }
        .input-area button { background-color: #008069; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #login-overlay input { padding: 10px; margin: 8px; font-size: 16px; width: 250px; text-align: center; border: 1px solid #ccc; border-radius: 5px;}
        #login-overlay button { padding: 12px 20px; background-color: #008069; color: white; border: none; border-radius: 5px; cursor: pointer; width: 272px; font-weight: bold; font-size: 16px; margin-top: 10px;}
        #login-overlay button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2>🛡️ Yönetici Kontrollü Güvenli Ağ</h2>
        <p id="adminStatus" style="color: #666; margin-bottom: 15px;">Yönetici (Sunucu) parametreleri bekleniyor...</p>
        
        <input type="text" id="myIdInput" placeholder="Kullanıcı Adınız">
        <input type="password" id="roomPasswordInput" placeholder="Oda Şifresi">
        
        <button id="connectBtn" onclick="attemptLogin()" disabled>Giriş Yapılamaz</button>
    </div>

    <div class="main-wrapper">
        <div class="side-panel">
            <div class="side-header">Aktif Kullanıcılar</div>
            <div class="user-list" id="userListbox"></div>
        </div>
        <div class="chat-container">
            <div class="header" id="chatHeader">Sohbet Ekranı</div>
            <div class="messages" id="messagesBox"></div>
            <div class="input-area">
                <input type="text" id="targetInput" placeholder="Hedef?">
                <input type="text" id="messageInput" placeholder="Mesajınız..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Gönder</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myId = "";
        let DH_P = null; 
        let DH_G = null;          
        let myPrivateKey = null;
        let myCalculatedPublicKey = null;
        let groupPublicKeys = {};

        function power(base, exp, mod) {
            let res = 1n;
            base = BigInt(base) % BigInt(mod);
            exp = BigInt(exp);
            while (exp > 0n) {
                if (exp % 2n === 1n) res = (res * base) % BigInt(mod);
                base = (base * base) % BigInt(mod);
                exp = exp / 2n;
            }
            return res;
        }

        socket.on('adminParameters', (data) => {
            DH_P = data.p;
            DH_G = data.g;
            myPrivateKey = Math.floor(Math.random() * 90000) + 10000;
            myCalculatedPublicKey = Number(power(DH_G, myPrivateKey, DH_P));
            
            document.getElementById('adminStatus').innerText = "✅ Ağ bağlantısı güvenli. Şifreyi giriniz.";
            document.getElementById('adminStatus').style.color = "green";
            const btn = document.getElementById('connectBtn');
            btn.innerText = "Sisteme Giriş Yap";
            btn.disabled = false;
        });

        // YENİ: Artık direkt girmiyoruz, sunucuya şifreyle deneme yapıyoruz
        function attemptLogin() {
            myId = document.getElementById('myIdInput').value.trim().toLowerCase();
            const roomPass = document.getElementById('roomPasswordInput').value.trim();
            
            if(!myId || !roomPass) {
                alert("Lütfen adınızı ve oda şifresini boş bırakmayın!");
                return;
            }
            
            if(myCalculatedPublicKey !== null) {
                // Sunucuya adımızı, DH anahtarımızı VE yazdığımız şifreyi yolluyoruz
                socket.emit('join', { 
                    user_id: myId, 
                    public_key: myCalculatedPublicKey,
                    room_password: roomPass
                });
            }
        }

        // YENİ: Sunucu şifreyi onaylarsa çalışacak kod
        socket.on('joinSuccess', (data) => {
            document.getElementById('login-overlay').style.display = 'none'; // Kapıyı aç
            document.getElementById('chatHeader').innerText = "Oturum: " + data.user_id.toUpperCase();
        });

        // YENİ: Sunucu şifreyi reddederse çalışacak kod
        socket.on('joinError', (data) => {
            alert(data.message); // Ekrana kırmızı hata uyarısı ver
            document.getElementById('roomPasswordInput').value = ''; // Şifre kutusunu temizle
        });

        function selectTarget(name) {
            if(name === myId) return;
            document.getElementById('targetInput').value = name;
        }

        function sendMessage() {
            const msgInput = document.getElementById('messageInput');
            const targetUser = document.getElementById('targetInput').value.trim().toLowerCase();
            const msgText = msgInput.value.trim();
            
            if(!msgText || !targetUser || !groupPublicKeys[targetUser]) return alert("Hedef seçilmedi veya mesaj boş!");

            const msgId = 'msg_' + Date.now();
            appendMessage(msgText, 'sent', msgId, '🕒', 'Alıcı: ' + targetUser.toUpperCase());

            const targetPubKey = groupPublicKeys[targetUser];
            const sharedSecret = Number(power(targetPubKey, myPrivateKey, DH_P));
            const aesKey = "DH_KEY_" + sharedSecret;

            const encryptedText = CryptoJS.AES.encrypt(msgText, aesKey).toString();
            
            socket.emit('sendMessage', {
                messageId: msgId,
                senderId: myId,
                targetId: targetUser,
                encryptedContent: encryptedText
            });
            msgInput.value = '';
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

        function appendMessage(text, type, id, statusSymbol = '', senderName = '') {
            const box = document.getElementById('messagesBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.id = id;
            let innerHtml = senderName ? `<span class="sender-name">${senderName}</span>` : '';
            let statusHtml = type === 'sent' ? `<span class="status" id="status_${id}">${statusSymbol}</span><span class="read-info" id="info_${id}"></span>` : '';
            msgDiv.innerHTML = innerHtml + `<span>${text}</span>` + statusHtml;
            box.appendChild(msgDiv);
            box.scrollTop = box.scrollHeight;
        }

        socket.on('updateUserList', (users) => {
            groupPublicKeys = users;
            const listbox = document.getElementById('userListbox');
            listbox.innerHTML = "";
            for(let username in users) {
                const item = document.createElement('div');
                item.className = "user-item";
                item.setAttribute('onclick', `selectTarget('${username}')`);
                let tag = username === myId ? " (Siz)" : "";
                item.innerHTML = `<span class="username">🟢 ${username}${tag}</span><span class="pubkey">DH Pub: ${users[username]}</span>`;
                listbox.appendChild(item);
            }
        });

        socket.on('messageStatus', (data) => {
            const statusSpan = document.getElementById('status_' + data.messageId);
            if(statusSpan) statusSpan.innerText = '✔️';
        });

        socket.on('updateStatus', (data) => {
            const statusSpan = document.getElementById('status_' + data.messageId);
            const infoSpan = document.getElementById('info_' + data.messageId);
            if(statusSpan) {
                if(data.status === 'delivered') {
                    statusSpan.innerText = '✔️✔️';
                    if(infoSpan) infoSpan.innerText = `(${data.reader.toUpperCase()} aldı)`;
                } else if(data.status === 'read') {
                    statusSpan.innerText = '✔️✔️';
                    statusSpan.classList.add('read');
                    if(infoSpan) infoSpan.innerText = `(${data.reader.toUpperCase()} okudu)`;
                }
            }
        });

        socket.on('receiveMessage', (data) => {
            if (data.targetId === myId) {
                const senderPubKey = groupPublicKeys[data.senderId];
                const sharedSecret = Number(power(senderPubKey, myPrivateKey, DH_P));
                const aesKey = "DH_KEY_" + sharedSecret;
                try {
                    const bytes = CryptoJS.AES.decrypt(data.encryptedContent, aesKey);
                    const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
                    if(decryptedText) {
                        appendMessage(decryptedText, 'received', data.messageId, '', data.senderId.toUpperCase());
                        socket.emit('messageDelivered', { messageId: data.messageId, senderId: data.senderId, reader: myId });
                        setTimeout(() => socket.emit('messageRead', { messageId: data.messageId, senderId: data.senderId, reader: myId }), 2000);
                    } else { throw new Error(); }
                } catch (e) {
                    appendMessage("⚠️ Şifre çözme hatası!", 'garbage', data.messageId, '', data.senderId.toUpperCase());
                }
            } else {
                appendMessage(data.encryptedContent, 'garbage', data.messageId, '', data.senderId.toUpperCase() + " ➔ " + data.targetId.toUpperCase() + " (Kilitli)");
            }
        });
    </script>
</body>
</html>
